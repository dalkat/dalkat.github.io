<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>/speaker — design reference (responsive)</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,30..100&family=Inter:wght@300..700&family=Caveat:wght@400..700&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=Newsreader:opsz,wght@6..72,300..700&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #fbf7ee; font-family: 'Inter', system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="mesh-pages/shared.jsx"></script>
<script type="text/babel" src="mesh-pages/shared-v7-override.jsx"></script>
<script type="text/babel" src="mesh-pages/speaker-themes-shared.jsx"></script>
<script type="text/babel" src="mesh-pages/speaker-n.jsx"></script>

<script type="text/babel">
  // Renders the /speaker page as a fully responsive document.
  // The .mesh-root class declares container-type: inline-size, and a
  // @container query in shared.jsx switches the page into its mobile
  // layout at <= 720px wide. Resize the browser to see both states.
  ReactDOM.createRoot(document.getElementById('root')).render(<window.MeshSpeakerN />);
</script>
</body>
</html>
